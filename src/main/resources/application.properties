# Server
server.port=8080

# Database (Uses Environment Variables for Deployment)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/splitmate}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Initialize data (categories)
spring.sql.init.mode=always  
spring.jpa.defer-datasource-initialization=true

# JWT
app.jwt.secret=SplitMateSecretKeyForJWTTokenGenerationPleaseUseLongEnoughKey
app.jwt.expiration-ms=86400000
